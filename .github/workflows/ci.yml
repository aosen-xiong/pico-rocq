name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml + opam
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
          opam-local-packages: |
            *.opam

      - name: Pin local package
        run: opam pin add . -n

      - name: Pin coq-record-update from GitHub
        run: opam pin add -n coq-record-update https://github.com/tchajed/coq-record-update.git

      - name: Install dependencies
        run: opam install . --deps-only -y

      - name: Check for forbidden axioms and admits
        run: python3 scripts/check-no-axioms-admits.py .

      - name: Show Coq toolchain versions
        run: |
          opam exec -- coqc --version
          opam list | grep -E '^(coq|coq-core|coq-stdlib|rocq-runtime|rocq-stdlib)\b' || true

      - name: Build with dune (wrapper over coq_makefile)
        run: opam exec -- dune build @default -j"$(nproc)"

      - name: Install Alectryon
        run: pipx install alectryon

      - name: Generate Alectryon docs
        run: opam exec -- make alectryon-doc

      - name: Verify rendered docs
        run: |
          set -e
          test -f alectryon/index.html
          awk '/[.]v$/ { print }' _RocqProject | while IFS= read -r f; do
            out="$(printf '%s\n' "$f" | sed 's#/#.#g; s#\.v$#.html#')"
            if [ ! -f "alectryon/$out" ]; then
              echo "Missing rendered file: alectryon/$out"
              exit 1
            fi
          done

      - name: Upload Alectryon docs
        uses: actions/upload-artifact@v4
        with:
          name: alectryon-docs
          path: alectryon/
          if-no-files-found: error
