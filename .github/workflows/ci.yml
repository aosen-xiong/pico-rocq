name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml + opam
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
          opam-local-packages: |
            *.opam

      - name: Pin local package
        run: opam pin add . -n

      - name: Install dependencies
        run: opam install . --deps-only -y

      - name: Build with dune
        run: opam exec -- dune build -j"$(nproc)"
